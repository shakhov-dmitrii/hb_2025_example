name: Python CI
description: Automated testing for Python projects using Ruff and pytest.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Позволяет ручной запуск workflow

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.8.21"

jobs:
  lint:
    name: Linting with Ruff
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: ${{ env.UV_VERSION }}

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run Ruff linter
      run: |
        uv run ruff check .
        uv run ./scripts/assert_linter.py tests/
#        uv run ruff format --check .

  test:
    name: Run Tests and Generate Allure Report
    runs-on: ubuntu-latest
    needs: lint  # Запускается только после успешного линтинга
    if: success()  # Запускается только если предыдущий job успешен

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Create allure-results directory
        run: mkdir -p allure-results

      - name: Run tests with make
        env:
          TG_BOT_TOKEN: ${{secrets.TG_BOT_TOKEN}}
          X_CG_DEMO_API_KEY: ${{secrets.X_CG_DEMO_API_KEY}}
        run: make test
        continue-on-error: true  # Продолжаем даже если тесты упали

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()  # Генерируем отчет даже если тесты упали
        id: allure-report
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          destination_dir: allure-history

      - name: Set Allure URL environment variable
        if: always()
        run: |
          REPO_NAME="${{ github.repository }}"
          REPO_OWNER="${{ github.repository_owner }}"
          ALLURE_URL="https://${REPO_OWNER}.github.io/${REPO_NAME##*/}/allure-history/${{ github.run_number }}"
          echo "ALLURE_URL=${ALLURE_URL}" >> $GITHUB_ENV
          echo "Allure report URL: ${ALLURE_URL}"

      - name: Send Allure results
        if: always()
        run: |
          echo "Sending Allure results with URL: $ALLURE_URL"
          uv run ./scripts/send_allure_results.py
        env:
          ALLURE_URL: ${{ env.ALLURE_URL }}
